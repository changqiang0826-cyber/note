<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 生日留言板</title>
<style>
  :root {
    --pink: #FF6B8A; --pink-dark: #E84E6A; --gold: #FFD700;
    --bg: #FFF8F0; --card: #FFFFFF; --text: #2D2D2D; --text2: #888;
    --border: #FFE0E6; --purple: #8B5CF6; --purple-bg: #F3EEFF;
    --green: #10B981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { text-align: center; padding: 44px 20px 28px; background: linear-gradient(135deg, #fff0f3, #fff8e8, #fff0f3); position: relative; }
  .header-cake { font-size: 52px; animation: bounce 2s ease infinite; }
  .header h1 { font-size: clamp(26px, 5vw, 38px); font-weight: 800; background: linear-gradient(135deg, var(--pink), var(--pink-dark), #FF8E53); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 6px 0; }
  .header p { color: var(--text2); font-size: 14px; }
  .admin-btn { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.75); border: none; border-radius: 18px; padding: 5px 13px; font-size: 12px; cursor: pointer; color: var(--text2); backdrop-filter: blur(8px); transition: .2s; }
  .admin-btn.active { background: var(--purple); color: #fff; }

  /* Container */
  .container { max-width: 780px; margin: 0 auto; padding: 20px 14px 60px; }

  /* Compose */
  .compose { background: var(--card); border-radius: 18px; padding: 20px; box-shadow: 0 3px 16px rgba(255,107,138,.07); border: 1px solid var(--border); margin-bottom: 28px; }
  .compose-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .compose input[type=text], .compose textarea, .compose select {
    padding: 10px 13px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; font-family: inherit; transition: .2s; background: #fff;
  }
  .compose input[type=text]:focus, .compose textarea:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,107,138,.1); }
  .compose input[type=text] { flex: 1; min-width: 140px; }
  .compose select { font-weight: 600; cursor: pointer; }
  .compose select.anon { background: var(--purple-bg); color: var(--purple); border-color: rgba(139,92,246,.3); }
  .compose textarea { width: 100%; resize: vertical; line-height: 1.7; min-height: 72px; }
  .compose-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 10px; }
  .img-label { padding: 7px 14px; border-radius: 10px; border: 1.5px dashed var(--border); cursor: pointer; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 5px; transition: .2s; }
  .img-label:hover { border-color: var(--pink); color: var(--pink); }
  .img-label.has-img { border-color: var(--green); color: var(--green); border-style: solid; }
  .img-clear { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text2); margin-left: 4px; }
  .submit-btn {
    padding: 10px 26px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: .2s;
    box-shadow: 0 4px 14px rgba(255,107,138,.3);
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,107,138,.35); }
  .submit-btn:disabled { background: #ddd; color: #aaa; cursor: not-allowed; box-shadow: none; transform: none; }
  .img-preview { margin-top: 10px; border-radius: 10px; overflow: hidden; max-height: 150px; }
  .img-preview img { width: 100%; max-height: 150px; object-fit: cover; display: block; }
  .anon-hint { margin-top: 10px; padding: 7px 12px; border-radius: 9px; background: var(--purple-bg); font-size: 12px; color: var(--purple); }

  /* Stats */
  .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; font-size: 13px; color: var(--text2); }
  .stats b { font-weight: 700; }
  .stats .pink { color: var(--pink); }
  .stats .purp { color: var(--purple); }

  /* Messages */
  .msg-grid { columns: 2 300px; column-gap: 14px; }
  .msg-card {
    background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 14px;
    box-shadow: 0 2px 10px rgba(255,107,138,.07); border: 1px solid var(--border);
    break-inside: avoid; position: relative; overflow: hidden; transition: .2s;
    animation: popIn .35s ease both;
  }
  .msg-card:hover { transform: translateY(-2px); box-shadow: 0 5px 18px rgba(255,107,138,.12); }
  .msg-card.anon { background: var(--purple-bg); border-color: rgba(139,92,246,.15); }
  .msg-card .badge { position: absolute; top: 9px; right: 10px; background: var(--purple); color: #fff; font-size: 10px; padding: 2px 9px; border-radius: 16px; font-weight: 600; }
  .msg-card .msg-img { margin: -16px -16px 12px; }
  .msg-card .msg-img img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
  .msg-card .msg-text { font-size: 14.5px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; }
  .msg-card .msg-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 9px; }
  .msg-card.anon .msg-footer { border-color: rgba(139,92,246,.12); }
  .msg-card .msg-name { font-size: 13px; font-weight: 600; color: var(--pink); }
  .msg-card.anon .msg-name { color: var(--purple); }
  .msg-card .msg-time { font-size: 11px; color: var(--text2); }
  .msg-card .msg-del { background: none; border: none; font-size: 13px; cursor: pointer; color: #ccc; padding: 2px 6px; border-radius: 6px; transition: .2s; }
  .msg-card .msg-del:hover { color: #e74c3c; background: #fee; }

  .empty { text-align: center; padding: 50px 20px; color: var(--text2); }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }

  /* Toast */
  .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 1000; box-shadow: 0 4px 18px rgba(16,185,129,.3); animation: popIn .3s ease; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(3px); }
  .modal { background: #fff; border-radius: 18px; padding: 28px; width: min(340px, 88vw); box-shadow: 0 16px 50px rgba(0,0,0,.15); animation: popIn .3s ease; }
  .modal h3 { font-size: 17px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .modal input { width: 100%; padding: 11px 13px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; }
  .modal input:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(139,92,246,.12); }
  .modal input.err { border-color: #e74c3c; }
  .modal .err-text { color: #e74c3c; font-size: 12px; margin-top: 5px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .modal-btns button { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: .2s; }
  .modal-btns .cancel { background: #fff; border: 1px solid var(--border); color: var(--text); }
  .modal-btns .confirm { background: linear-gradient(135deg, var(--purple), #7C3AED); border: none; color: #fff; font-weight: 600; }

  /* Floating emojis */
  .float-emoji { position: fixed; font-size: 22px; pointer-events: none; z-index: 0; animation: floatUp 5.5s ease-in forwards; }

  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes popIn { 0%{transform:scale(.85);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes floatUp { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-100vh) rotate(360deg);opacity:0} }

  @media(max-width:500px) {
    .msg-grid { columns: 1; }
    .compose-row { flex-direction: column; }
    .compose input[type=text] { min-width: auto; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-cake">🎂</div>
  <h1>🎉 生日快乐 🎉</h1>
  <p>留下你的祝福吧，每一条都很珍贵 💖</p>
  <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔐 管理入口</button>
</div>

<div class="container">
  <!-- Compose -->
  <div class="compose">
    <div class="compose-row">
      <input type="text" id="inputName" placeholder="你的名字 *">
      <select id="selectMode" onchange="onModeChange()">
        <option value="public">🌍 公开留言</option>
        <option value="anonymous">🔒 匿名留言</option>
      </select>
    </div>
    <textarea id="inputText" placeholder="写下你的祝福..."></textarea>
    <div class="compose-actions">
      <div style="display:flex;align-items:center;gap:6px;">
        <label class="img-label" id="imgLabel">
          📷 <span id="imgLabelText">添加图片</span>
          <input type="file" accept="image/*" id="inputFile" onchange="onFileChange()" style="display:none">
        </label>
        <button class="img-clear" id="imgClear" onclick="clearImage()" style="display:none">✕</button>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitMessage()">送出祝福 🎉</button>
    </div>
    <div class="img-preview" id="imgPreview" style="display:none"><img id="previewImg"></div>
    <div class="anon-hint" id="anonHint" style="display:none">🔒 匿名留言仅寿星可以看到，不会公开显示你的名字</div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Messages -->
  <div id="msgArea"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>🔐 管理员验证</h3>
    <p>输入密码查看所有匿名留言</p>
    <input type="password" id="pwInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err-text" id="pwErr" style="display:none">密码不正确，请重试</div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal()">取消</button>
      <button class="confirm" onclick="doLogin()">确认</button>
    </div>
  </div>
</div>

<script>
// ========== State ==========
let isAdmin = false;
let adminPw = "";
let allMessages = [];
const emojiPool = ["🎂","🎈","🎁","🎉","🥳","🎊","✨","💖","🌟","🍰"];

// ========== Init ==========
loadMessages();

function loadMessages() {
  const url = isAdmin ? "/api/messages?admin=" + encodeURIComponent(adminPw) : "/api/messages";
  fetch(url).then(r => r.json()).then(data => {
    allMessages = data.messages || [];
    renderMessages();
    loadStats();
  }).catch(() => {});
}

function loadStats() {
  fetch("/api/stats").then(r => r.json()).then(s => {
    let html = `🌍 公开留言 <b class="pink">${s.public}</b>`;
    if (isAdmin) html += ` &nbsp; 🔒 匿名留言 <b class="purp">${s.anonymous}</b>`;
    html += ` &nbsp; 💌 总共 <b>${s.total}</b>`;
    document.getElementById("stats").innerHTML = html;
  }).catch(() => {});
}

// ========== Render ==========
function renderMessages() {
  const area = document.getElementById("msgArea");
  if (allMessages.length === 0) {
    area.innerHTML = '<div class="empty"><div class="empty-icon">💌</div><p>还没有留言，快来写下第一条祝福吧！</p></div>';
    return;
  }
  let html = '<div class="msg-grid">';
  allMessages.forEach((m, i) => {
    const isAnon = m.mode === "anonymous";
    html += `<div class="msg-card ${isAnon ? 'anon' : ''}" style="animation-delay:${i*0.04}s">`;
    if (isAnon && isAdmin) html += '<div class="badge">🔒 匿名</div>';
    if (m.image) html += `<div class="msg-img"><img src="${escapeHtml(m.image)}" alt="留言图片" loading="lazy"></div>`;
    html += `<div class="msg-text">${escapeHtml(m.text)}</div>`;
    html += '<div class="msg-footer">';
    html += `<span class="msg-name">${isAnon ? (isAdmin ? '🤫 '+escapeHtml(m.name) : '匿名来客') : '💌 '+escapeHtml(m.name)}</span>`;
    html += `<span style="display:flex;align-items:center;gap:6px;"><span class="msg-time">${escapeHtml(m.time)}</span>`;
    if (isAdmin) html += `<button class="msg-del" onclick="deleteMsg('${m.id}')" title="删除">🗑️</button>`;
    html += '</span></div></div>';
  });
  html += '</div>';
  area.innerHTML = html;
}

function escapeHtml(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ========== Compose ==========
function onModeChange() {
  const mode = document.getElementById("selectMode").value;
  const sel = document.getElementById("selectMode");
  const hint = document.getElementById("anonHint");
  const nameInput = document.getElementById("inputName");
  if (mode === "anonymous") {
    sel.classList.add("anon");
    hint.style.display = "";
    nameInput.placeholder = "名字(可不填，仅寿星可见)";
  } else {
    sel.classList.remove("anon");
    hint.style.display = "none";
    nameInput.placeholder = "你的名字 *";
  }
}

function onFileChange() {
  const file = document.getElementById("inputFile").files[0];
  if (!file) return;
  if (file.size > 2*1024*1024) { showToast("⚠️ 图片不能超过2MB"); document.getElementById("inputFile").value=""; return; }
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("imgPreview").style.display = "";
    document.getElementById("imgLabelText").textContent = "已选图片";
    document.getElementById("imgLabel").classList.add("has-img");
    document.getElementById("imgClear").style.display = "";
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  document.getElementById("inputFile").value = "";
  document.getElementById("imgPreview").style.display = "none";
  document.getElementById("imgLabelText").textContent = "添加图片";
  document.getElementById("imgLabel").classList.remove("has-img");
  document.getElementById("imgClear").style.display = "none";
}

function submitMessage() {
  const name = document.getElementById("inputName").value.trim();
  const text = document.getElementById("inputText").value.trim();
  const mode = document.getElementById("selectMode").value;
  const fileInput = document.getElementById("inputFile");

  if (!text) { showToast("⚠️ 请写点什么吧~"); return; }
  if (mode === "public" && !name) { showToast("⚠️ 公开留言请填写名字"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "发送中...";

  const formData = new FormData();
  formData.append("name", name);
  formData.append("text", text);
  formData.append("mode", mode);
  if (fileInput.files[0]) formData.append("image", fileInput.files[0]);

  fetch("/api/messages", { method: "POST", body: formData })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        document.getElementById("inputName").value = "";
        document.getElementById("inputText").value = "";
        clearImage();
        document.getElementById("selectMode").value = "public";
        onModeChange();
        showToast("✅ 祝福已送达！感谢你 💖");
        spawnEmojis();
        loadMessages();
      } else {
        showToast("⚠️ " + (data.error || "发送失败"));
      }
    })
    .catch(() => showToast("⚠️ 网络错误，请重试"))
    .finally(() => { btn.disabled = false; btn.textContent = "送出祝福 🎉"; });
}

// ========== Admin ==========
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false; adminPw = "";
    document.getElementById("adminBtn").textContent = "🔐 管理入口";
    document.getElementById("adminBtn").classList.remove("active");
    loadMessages();
  } else {
    document.getElementById("modalBg").style.display = "flex";
    setTimeout(() => document.getElementById("pwInput").focus(), 100);
  }
}

function closeModal() {
  document.getElementById("modalBg").style.display = "none";
  document.getElementById("pwInput").value = "";
  document.getElementById("pwErr").style.display = "none";
  document.getElementById("pwInput").classList.remove("err");
}

function doLogin() {
  const pw = document.getElementById("pwInput").value;
  fetch("/api/auth", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:pw}) })
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(() => {
      isAdmin = true; adminPw = pw;
      closeModal();
      document.getElementById("adminBtn").textContent = "🔓 管理模式";
      document.getElementById("adminBtn").classList.add("active");
      loadMessages();
    })
    .catch(() => {
      document.getElementById("pwErr").style.display = "";
      document.getElementById("pwInput").classList.add("err");
    });
}

function deleteMsg(id) {
  if (!confirm("确定要删除这条留言吗？")) return;
  fetch("/api/messages/" + id, {
    method: "DELETE",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ password: adminPw })
  }).then(r => r.json()).then(() => loadMessages())
    .catch(() => showToast("⚠️ 删除失败"));
}

// ========== Utils ==========
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "";
  setTimeout(() => t.style.display = "none", 2600);
}

function spawnEmojis() {
  for (let i = 0; i < 8; i++) {
    const el = document.createElement("div");
    el.className = "float-emoji";
    el.textContent = emojiPool[Math.floor(Math.random()*emojiPool.length)];
    el.style.left = (10+Math.random()*80)+"%";
    el.style.bottom = "-30px";
    el.style.animationDuration = (4+Math.random()*2.5)+"s";
    el.style.animationDelay = (Math.random()*0.4)+"s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
}
</script>
</body>
</html>
