<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戗の留言板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
  :root { --bg:#FAFAFA;--card:#FFF;--text:#262626;--text2:#8E8E8E;--border:#DBDBDB;--hover:#F5F5F5;--anon-bg:#F9F9F9;--like:#ED4956;--blue:#0095F6; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Noto Sans SC",-apple-system,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}

  .header{text-align:center;padding:60px 20px 40px;position:relative;border-bottom:1px solid var(--border);background:#fff}
  .header h1{font-family:"Playfair Display",serif;font-size:clamp(32px,6vw,48px);font-weight:600;letter-spacing:2px;margin-bottom:8px}
  .header p{color:var(--text2);font-size:14px;font-weight:300;letter-spacing:1px}
  .hdr-right{position:absolute;top:20px;right:20px;display:flex;gap:8px;align-items:center}
  .hdr-user{font-size:13px;color:var(--text);font-weight:500}
  .hdr-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 13px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:.2s}
  .hdr-btn:hover{border-color:var(--text);color:var(--text)}
  .hdr-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

  .container{max-width:640px;margin:0 auto;padding:28px 16px 80px}

  /* Auth card */
  .auth-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;max-width:380px;margin:40px auto}
  .auth-card h2{font-size:20px;font-weight:500;margin-bottom:4px;text-align:center}
  .auth-card .sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
  .auth-card input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);margin-bottom:12px;transition:.2s}
  .auth-card input:focus{outline:none;border-color:var(--text)}
  .auth-card .btn{width:100%;padding:11px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
  .auth-card .btn:hover{opacity:.9}
  .auth-card .btn:disabled{opacity:.5;cursor:not-allowed}
  .auth-card .links{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
  .auth-card .links a{margin:0 6px}
  .auth-card .err{color:var(--like);font-size:13px;text-align:center;margin-bottom:12px}
  .auth-card .ok{color:#10B981;font-size:13px;text-align:center;margin-bottom:12px}

  /* Compose */
  .compose{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:32px}
  .compose-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .c-sel{padding:11px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg);font-weight:500;cursor:pointer}
  .c-sel.anon{background:var(--anon-bg);color:var(--text2)}
  .compose textarea{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg);resize:vertical;line-height:1.8;min-height:80px;transition:.2s}
  .compose textarea:focus{outline:none;border-color:var(--text)}
  .compose-actions{display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:10px}
  .img-label{padding:8px 16px;border-radius:8px;border:1px dashed var(--border);cursor:pointer;font-size:13px;color:var(--text2);transition:.2s}
  .img-label:hover{border-color:var(--text);color:var(--text)}
  .img-label.has{border-color:var(--text);color:var(--text);border-style:solid}
  .s-btn{padding:10px 28px;border-radius:8px;border:none;background:var(--text);color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:.2s}
  .s-btn:hover{opacity:.85}
  .s-btn:disabled{background:var(--border);color:var(--text2);cursor:not-allowed}
  .img-preview{margin-top:12px;border-radius:8px;overflow:hidden;max-height:160px}
  .img-preview img{width:100%;max-height:160px;object-fit:cover;display:block}
  .anon-hint{margin-top:12px;padding:10px 14px;border-radius:8px;background:var(--anon-bg);font-size:12px;color:var(--text2);border:1px solid #EFEFEF}

  .stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;font-size:13px;color:var(--text2);font-weight:300}
  .stats b{font-weight:500;color:var(--text)}

  /* Messages */
  .msg-list{display:flex;flex-direction:column;gap:16px}
  .msg-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:.25s;animation:fadeIn .4s ease both}
  .msg-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.05)}
  .msg-card.anon{background:var(--anon-bg);border-color:#EFEFEF}
  .badge{display:inline-block;background:var(--text2);color:#fff;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;margin-left:6px}
  .msg-img img{width:100%;max-height:400px;object-fit:cover;display:block}
  .msg-body{padding:16px 18px}
  .msg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .msg-name{font-size:14px;font-weight:500}
  .msg-time{font-size:11px;color:var(--text2);font-weight:300}
  .msg-text{font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;font-weight:300}
  .msg-actions{display:flex;align-items:center;gap:16px;padding:10px 18px;border-top:1px solid #F0F0F0}
  .act-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px;transition:.2s;font-family:inherit;padding:4px 0}
  .act-btn:hover{color:var(--text)}
  .act-btn.liked{color:var(--like)}
  .act-btn.self{opacity:.3;cursor:default}
  .act-btn svg{width:18px;height:18px}
  .del-btn{margin-left:auto;font-size:12px;color:var(--border);cursor:pointer;background:none;border:none;font-family:inherit;transition:.2s}
  .del-btn:hover{color:var(--like)}
  .replies{padding:0 18px 14px}
  .reply-item{display:flex;gap:8px;padding:6px 0;font-size:13px;line-height:1.6;flex-wrap:wrap;align-items:baseline}
  .r-name{font-weight:500;white-space:nowrap}
  .r-text{font-weight:300;word-break:break-word}
  .r-time{font-size:11px;color:var(--text2);white-space:nowrap;margin-left:6px}
  .r-del{font-size:11px;color:var(--border);cursor:pointer;background:none;border:none;margin-left:4px;font-family:inherit}
  .r-del:hover{color:var(--like)}
  .reply-box{display:flex;gap:8px;padding:10px 18px;border-top:1px solid #F0F0F0;align-items:center}
  .reply-box input{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;color:var(--text);padding:4px 0}
  .reply-box input:focus{outline:none}
  .reply-box button{background:none;border:none;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
  .reply-box button:hover{opacity:.7}

  .empty{text-align:center;padding:60px 20px;color:var(--text2);font-weight:300}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:1000;animation:fadeIn .3s ease;color:#fff;background:var(--text);font-family:inherit}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
  .modal{background:#fff;border-radius:16px;padding:32px;width:min(360px,88vw);animation:fadeIn .25s ease}
  .modal h3{font-size:18px;font-weight:500;margin-bottom:6px}
  .modal p{font-size:13px;color:var(--text2);margin-bottom:18px;font-weight:300}
  .modal input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg)}
  .modal input:focus{outline:none;border-color:var(--text)}
  .modal-btns{display:flex;gap:10px;margin-top:20px}
  .modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500}
  .modal-btns .cancel{background:var(--bg);border:1px solid var(--border);color:var(--text)}
  .modal-btns .confirm{background:var(--text);border:none;color:#fff}
  @keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
  @media(max-width:500px){.header{padding:40px 16px 28px}.hdr-right{top:12px;right:12px;flex-direction:column;align-items:flex-end;gap:4px}}
</style>
</head>
<body>

<div class="header">
  <h1>戗の留言板</h1>
  <p>留下你想说的话</p>
  <div class="hdr-right" id="hdrRight"></div>
</div>

<div class="container" id="main"></div>
<div class="toast" id="toast" style="display:none"></div>

<!-- Admin Modal -->
<div class="modal-bg" id="modalAdmin" style="display:none" onclick="closeAdminModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>管理员验证</h3>
    <p>输入密码查看匿名留言并管理内容</p>
    <input type="password" id="adminPwInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <div style="color:var(--like);font-size:12px;margin-top:5px;display:none" id="adminErr">密码不正确</div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeAdminModal()">取消</button>
      <button class="confirm" onclick="doAdminLogin()">确认</button>
    </div>
  </div>
</div>

<script>
const HEART_E=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const HEART_F=`<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const REPLY_I=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;

let currentUser = null; // { token, id, email, displayName }
let isAdmin = false, adminPw = "";
let allMessages = [];
let likedSet = new Set(JSON.parse(localStorage.getItem("liked")||"[]"));

// ===== Init =====
const saved = localStorage.getItem("auth");
if (saved) {
  try { currentUser = JSON.parse(saved); verifyUser(); } catch { currentUser = null; }
} else render();

function verifyUser() {
  apiFetch("/api/auth/me").then(d => {
    currentUser.id = d.id;
    currentUser.displayName = d.displayName;
    render();
  }).catch(() => { currentUser = null; localStorage.removeItem("auth"); render(); });
}

// ===== API helper =====
function apiFetch(url, opts = {}) {
  if (currentUser?.token) {
    opts.headers = opts.headers || {};
    opts.headers["x-token"] = currentUser.token;
  }
  return fetch(url, opts).then(r => r.json().then(d => r.ok ? d : Promise.reject(d)));
}

// ===== Render =====
function render() {
  renderHeader();
  if (!currentUser) renderAuth();
  else renderBoard();
}

function renderHeader() {
  const el = document.getElementById("hdrRight");
  if (!currentUser) { el.innerHTML = ''; return; }
  let h = `<span class="hdr-user">${esc(currentUser.displayName)}</span>`;
  h += `<button class="hdr-btn" onclick="logout()">退出</button>`;
  h += `<button class="hdr-btn ${isAdmin?'active':''}" id="adminBtn" onclick="toggleAdmin()">${isAdmin?'退出管理':'管理'}</button>`;
  el.innerHTML = h;
}

// ===== Auth screens =====
let authMode = "login"; // login | register | recover

function renderAuth() {
  const el = document.getElementById("main");
  let h = '<div class="auth-card">';
  if (authMode === "login") {
    h += '<h2>登录</h2><p class="sub">登录后即可留言</p>';
    h += '<div class="err" id="authErr" style="display:none"></div>';
    h += '<input id="aEmail" type="email" placeholder="邮箱">';
    h += '<input id="aPw" type="password" placeholder="密码" onkeydown="if(event.key===\'Enter\')doLogin()">';
    h += '<button class="btn" onclick="doLogin()">登录</button>';
    h += '<div class="links"><a href="#" onclick="authMode=\'register\';renderAuth();return false">注册账号</a><a href="#" onclick="authMode=\'recover\';renderAuth();return false">忘记密码</a></div>';
  } else if (authMode === "register") {
    h += '<h2>注册</h2><p class="sub">创建账号后即可留言</p>';
    h += '<div class="err" id="authErr" style="display:none"></div>';
    h += '<div class="ok" id="authOk" style="display:none"></div>';
    h += '<input id="aName" type="text" placeholder="昵称" maxlength="20">';
    h += '<input id="aEmail" type="email" placeholder="邮箱">';
    h += '<input id="aPw" type="password" placeholder="密码（至少6位）" onkeydown="if(event.key===\'Enter\')doRegister()">';
    h += '<button class="btn" onclick="doRegister()">注册</button>';
    h += '<div class="links"><a href="#" onclick="authMode=\'login\';renderAuth();return false">已有账号，去登录</a></div>';
  } else {
    h += '<h2>找回密码</h2><p class="sub">输入注册邮箱，我们会发送重置链接</p>';
    h += '<div class="err" id="authErr" style="display:none"></div>';
    h += '<div class="ok" id="authOk" style="display:none"></div>';
    h += '<input id="aEmail" type="email" placeholder="邮箱" onkeydown="if(event.key===\'Enter\')doRecover()">';
    h += '<button class="btn" onclick="doRecover()">发送重置邮件</button>';
    h += '<div class="links"><a href="#" onclick="authMode=\'login\';renderAuth();return false">返回登录</a></div>';
  }
  h += '</div>';
  el.innerHTML = h;
  setTimeout(() => { const f = document.getElementById("aEmail") || document.getElementById("aName"); if(f) f.focus(); }, 50);
}

function showAuthErr(msg) { const e=document.getElementById("authErr"); if(e){e.textContent=msg;e.style.display="";} }
function showAuthOk(msg) { const e=document.getElementById("authOk"); if(e){e.textContent=msg;e.style.display="";} }

async function doLogin() {
  const email = document.getElementById("aEmail").value.trim();
  const pw = document.getElementById("aPw").value;
  if (!email||!pw) return showAuthErr("请填写邮箱和密码");
  try {
    const d = await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})}).then(r=>r.json().then(j=>r.ok?j:Promise.reject(j)));
    currentUser = { token: d.token, id: d.user.id, email: d.user.email, displayName: d.user.displayName };
    localStorage.setItem("auth", JSON.stringify(currentUser));
    render();
  } catch(e) { showAuthErr(e.error||"登录失败"); }
}

async function doRegister() {
  const name = document.getElementById("aName").value.trim();
  const email = document.getElementById("aEmail").value.trim();
  const pw = document.getElementById("aPw").value;
  if (!name) return showAuthErr("请填写昵称");
  if (!email) return showAuthErr("请填写邮箱");
  if (!pw||pw.length<6) return showAuthErr("密码至少6位");
  try {
    const d = await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pw,displayName:name})}).then(r=>r.json().then(j=>r.ok?j:Promise.reject(j)));
    if (d.needConfirm) { showAuthOk(d.message || "注册成功！请查收验证邮件后登录"); }
    else if (d.token) {
      currentUser = { token: d.token, email, displayName: name };
      localStorage.setItem("auth", JSON.stringify(currentUser));
      render();
    }
  } catch(e) { showAuthErr(e.error||"注册失败"); }
}

async function doRecover() {
  const email = document.getElementById("aEmail").value.trim();
  if (!email) return showAuthErr("请输入邮箱");
  try {
    const d = await fetch("/api/auth/recover",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})}).then(r=>r.json());
    showAuthOk(d.message || "如果该邮箱已注册，重置邮件将会发送");
  } catch(e) { showAuthErr("发送失败"); }
}

function logout() {
  currentUser = null; isAdmin = false; adminPw = "";
  localStorage.removeItem("auth");
  render();
}

// ===== Board =====
function renderBoard() {
  let h = '';
  // Compose
  h += '<div class="compose"><div class="compose-row">';
  h += `<span style="padding:11px 0;font-size:14px;font-weight:500">${esc(currentUser.displayName)}</span>`;
  h += '<select class="c-sel" id="selectMode" onchange="onModeChange()"><option value="public">公开</option><option value="anonymous">匿名</option></select>';
  h += '</div>';
  h += '<textarea id="inputText" placeholder="写点什么..."></textarea>';
  h += '<div class="compose-actions"><div style="display:flex;align-items:center;gap:6px">';
  h += '<label class="img-label" id="imgLabel">+ <span id="imgLabelText">图片</span><input type="file" accept="image/*" id="inputFile" onchange="onFileChange()" style="display:none"></label>';
  h += '<button style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);display:none" id="imgClear" onclick="clearImage()">✕</button>';
  h += '</div><button class="s-btn" id="submitBtn" onclick="submitMessage()">发送</button></div>';
  h += '<div class="img-preview" id="imgPreview" style="display:none"><img id="previewImg"></div>';
  h += '<div class="anon-hint" id="anonHint" style="display:none">匿名留言仅我可见，不会公开显示你的名字</div>';
  h += '</div>';
  h += '<div class="stats" id="stats"></div>';
  h += '<div id="msgArea"></div>';
  document.getElementById("main").innerHTML = h;
  loadMessages();
}

function loadMessages() {
  const url = isAdmin ? "/api/messages?admin="+encodeURIComponent(adminPw) : "/api/messages";
  fetch(url).then(r=>r.json()).then(d => { allMessages = d.messages||[]; renderMessages(); loadStats(); }).catch(()=>{});
}

function loadStats() {
  fetch("/api/stats").then(r=>r.json()).then(s => {
    let h = `公开 <b>${s.public}</b>`;
    if (isAdmin) h += `&emsp;匿名 <b>${s.anonymous}</b>`;
    h += `&emsp;总计 <b>${s.total}</b>`;
    const el = document.getElementById("stats"); if(el) el.innerHTML = h;
  }).catch(()=>{});
}

function renderMessages() {
  const area = document.getElementById("msgArea");
  if (!area) return;
  if (!allMessages.length) { area.innerHTML='<div class="empty"><p>还没有留言，来写第一条吧</p></div>'; return; }

  let h = '<div class="msg-list">';
  allMessages.forEach((m,i) => {
    const a = m.mode==="anonymous";
    const liked = likedSet.has(m.id);
    const isMine = currentUser && m.user_id === currentUser.id;
    const replies = m.replies||[];

    h += `<div class="msg-card ${a?'anon':''}" style="animation-delay:${i*.03}s">`;
    if (m.image) h += `<div class="msg-img"><img src="${esc(m.image)}" loading="lazy"></div>`;
    h += '<div class="msg-body">';
    h += `<div class="msg-top"><span class="msg-name">${a?(isAdmin?esc(m.name)+'<span class="badge">匿名</span>':'匿名'):esc(m.name)}</span><span class="msg-time">${esc(m.time)}</span></div>`;
    h += `<div class="msg-text">${esc(m.text)}</div></div>`;

    h += '<div class="msg-actions">';
    if (isMine) {
      h += `<span class="act-btn self">${HEART_E}<span class="count">${m.likes||''}</span></span>`;
    } else {
      h += `<button class="act-btn ${liked?'liked':''}" onclick="doLike('${m.id}')">${liked?HEART_F:HEART_E}<span class="count">${m.likes||''}</span></button>`;
    }
    h += `<button class="act-btn" onclick="focusReply('${m.id}')">${REPLY_I}<span class="count">${replies.length||''}</span></button>`;
    if (isMine || isAdmin) h += `<button class="del-btn" onclick="deleteMsg('${m.id}','${isMine}')">删除</button>`;
    h += '</div>';

    if (replies.length) {
      h += '<div class="replies">';
      replies.forEach(r => {
        const myReply = currentUser && r.user_id === currentUser.id;
        h += `<div class="reply-item"><span class="r-name">${esc(r.name)}</span><span class="r-text">${esc(r.text)}</span><span class="r-time">${esc(r.time)}</span>`;
        if (myReply||isAdmin) h += `<button class="r-del" onclick="deleteReply('${r.id}','${myReply}')">删除</button>`;
        h += '</div>';
      });
      h += '</div>';
    }
    h += `<div class="reply-box"><input id="reply-${m.id}" placeholder="回复..." onkeydown="if(event.key==='Enter')sendReply('${m.id}')"><button onclick="sendReply('${m.id}')">发送</button></div>`;
    h += '</div>';
  });
  h += '</div>';
  area.innerHTML = h;
}

function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""}

// ===== Actions =====
function doLike(id) {
  if (likedSet.has(id)) return;
  likedSet.add(id); localStorage.setItem("liked",JSON.stringify([...likedSet]));
  apiFetch(`/api/messages/${id}/like`,{method:"POST",headers:{"Content-Type":"application/json"}})
    .then(()=>loadMessages()).catch(e=>{ likedSet.delete(id); showToast(e.error||"点赞失败"); });
}

function focusReply(id) { const el=document.getElementById("reply-"+id); if(el)el.focus(); }

function sendReply(msgId) {
  const input=document.getElementById("reply-"+msgId);
  const text=input.value.trim();
  if(!text)return;
  apiFetch(`/api/messages/${msgId}/reply`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})})
    .then(()=>{input.value="";loadMessages()}).catch(e=>showToast(e.error||"回复失败"));
}

function deleteMsg(id, isMine) {
  if(!confirm("确定删除这条留言？"))return;
  const opts = {method:"DELETE",headers:{"Content-Type":"application/json","x-token":currentUser?.token||""}};
  if(isAdmin&&!isMine) opts.body=JSON.stringify({password:adminPw});
  else opts.body=JSON.stringify({});
  fetch("/api/messages/"+id,opts).then(r=>r.json()).then(()=>{showToast("已删除");loadMessages()}).catch(()=>showToast("删除失败"));
}

function deleteReply(id, isMine) {
  if(!confirm("确定删除这条回复？"))return;
  const opts={method:"DELETE",headers:{"Content-Type":"application/json","x-token":currentUser?.token||""}};
  if(isAdmin&&!isMine) opts.body=JSON.stringify({password:adminPw});
  else opts.body=JSON.stringify({});
  fetch("/api/replies/"+id,opts).then(r=>r.json()).then(()=>{showToast("已删除");loadMessages()}).catch(()=>showToast("删除失败"));
}

// ===== Compose =====
function onModeChange(){const m=document.getElementById("selectMode").value;document.getElementById("anonHint").style.display=m==="anonymous"?"":"none";document.getElementById("selectMode").classList.toggle("anon",m==="anonymous")}
function onFileChange(){const f=document.getElementById("inputFile").files[0];if(!f)return;if(f.size>800*1024){showToast("图片不能超过800KB");document.getElementById("inputFile").value="";return}const r=new FileReader();r.onload=e=>{document.getElementById("previewImg").src=e.target.result;document.getElementById("imgPreview").style.display="";document.getElementById("imgLabelText").textContent="已选";document.getElementById("imgLabel").classList.add("has");document.getElementById("imgClear").style.display=""};r.readAsDataURL(f)}
function clearImage(){document.getElementById("inputFile").value="";document.getElementById("imgPreview").style.display="none";document.getElementById("imgLabelText").textContent="图片";document.getElementById("imgLabel").classList.remove("has");document.getElementById("imgClear").style.display="none"}

function submitMessage(){
  const text=document.getElementById("inputText").value.trim();
  const mode=document.getElementById("selectMode").value;
  const fi=document.getElementById("inputFile");
  if(!text){showToast("请写点什么");return}
  const btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="发送中...";
  const fd=new FormData();fd.append("text",text);fd.append("mode",mode);
  if(fi.files[0])fd.append("image",fi.files[0]);
  fetch("/api/messages",{method:"POST",headers:{"x-token":currentUser.token},body:fd})
    .then(r=>r.json().then(j=>r.ok?j:Promise.reject(j)))
    .then(()=>{document.getElementById("inputText").value="";clearImage();document.getElementById("selectMode").value="public";onModeChange();showToast("已发送");loadMessages()})
    .catch(e=>showToast(e.error||"发送失败"))
    .finally(()=>{btn.disabled=false;btn.textContent="发送"});
}

// ===== Admin =====
function toggleAdmin(){
  if(isAdmin){isAdmin=false;adminPw="";renderHeader();loadMessages()}
  else{document.getElementById("modalAdmin").style.display="flex";setTimeout(()=>document.getElementById("adminPwInput").focus(),100)}
}
function closeAdminModal(){document.getElementById("modalAdmin").style.display="none";document.getElementById("adminPwInput").value="";document.getElementById("adminErr").style.display="none"}
function doAdminLogin(){
  const pw=document.getElementById("adminPwInput").value;
  fetch("/api/admin/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})})
    .then(r=>{if(!r.ok)throw 0;return r.json()})
    .then(()=>{isAdmin=true;adminPw=pw;closeAdminModal();renderHeader();loadMessages()})
    .catch(()=>{document.getElementById("adminErr").style.display=""});
}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="";setTimeout(()=>t.style.display="none",2200)}
</script>
